<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>বাৎসরিক রিপোর্ট</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d6efd">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">

<div>

<h2>📊 বাৎসরিক রিপোর্ট</h2>

<p>ঐক্য সংগঠন</p>

</div>

<button
class="back-btn"
onclick="history.back()">

←

</button>

</header>

<div class="container">

<div class="card">

<h3>বছর নির্বাচন করুন</h3>

<input
type="number"
id="reportYear"
class="input"
placeholder="বছর">

<br><br>

<button
id="loadYearlyReport"
class="btn">

📊 রিপোর্ট দেখুন

</button>

</div>

<div class="stats-grid">

<div class="stat-card">

<h2 id="yearTotalMembers">0</h2>

<p>মোট সদস্য</p>

</div>

<div class="stat-card">

<h2 id="yearTotalPaid">0</h2>

<p>মোট জমা</p>

</div>

<div class="stat-card">

<h2 id="yearTotalMoney">৳ 0</h2>

<p>মোট সংগ্রহ</p>

</div>

</div>

<div class="card">

<h3>মাসভিত্তিক সংগ্রহ</h3>

<div id="yearlyList">

<p>কোন তথ্য নেই</p>

</div>

</div>

<div class="card">

<button
id="downloadYearlyPdf"
class="btn">

📄 PDF Download

</button>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="js/yearly-report.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("./sw.js")

.then(() => {

console.log("Service Worker Registered");

})

.catch((err) => {

console.log("Service Worker Error:", err);

});

});

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>সদস্যের তথ্য</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d6efd">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">

<div>

<h2>সদস্যের তথ্য</h2>

<p>ঐক্য সংগঠন</p>

</div>

<button class="back-btn" onclick="history.back()">

←

</button>

</header>

<div class="container" style="margin-top:20px;">

<div class="card" style="text-align:center;">

<img
id="detailPhoto"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
class="detail-photo">

<h2 id="detailName">লোড হচ্ছে...</h2>

<p id="detailHouse"></p>

<p id="detailPhone"></p>

<hr style="margin:20px 0;">

<h3>মোট জমা</h3>

<h1 id="totalAmount">০ টাকা</h1>

</div>

<div class="card" style="margin-top:20px;">

<h3>মাসভিত্তিক হিসাব</h3>

<div id="paymentList">

<p>কোন হিসাব পাওয়া যায়নি।</p>

</div>

</div>

<div class="card" style="margin-top:20px;">

<button class="btn" id="downloadPdf">

📄 PDF Download

</button>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="js/member-details.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("./sw.js")

.then(() => {

console.log("Service Worker Registered");

})

.catch((err) => {

console.log("Service Worker Error:", err);

});

});

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ঐক্য - রেজিস্ট্রেশন</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d6efd">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container" style="padding:30px 0;">

<div class="card">

<h1 class="title">রেজিস্ট্রেশন</h1>

<p class="subtitle">

নতুন সদস্য নিবন্ধন করুন

</p>

<form id="registerForm">

<div class="input-group">

<label>নাম</label>

<input
type="text"
id="name"
placeholder="আপনার নাম লিখুন"
required>

</div>

<div class="input-group">

<label>বাড়ি</label>

<select id="house" required>

<option value="">বাড়ি নির্বাচন করুন</option>

<option>গাজিবাড়ি</option>

<option>মোল্লাবাড়ি</option>

<option>শেখবাড়ি</option>

<option>চৌধুরী বাড়ি</option>

</select>

</div>

<div class="input-group">

<label>কান্ট্রি কোড</label>

<select id="countryCode">

<option value="+880">🇧🇩 +880</option>

<option value="+966">🇸🇦 +966</option>

<option value="+91">🇮🇳 +91</option>

<option value="+971">🇦🇪 +971</option>

<option value="+92">🇵🇰 +92</option>

</select>

</div>

<div class="input-group">

<label>মোবাইল নম্বর</label>

<input
type="tel"
id="phone"
placeholder="মোবাইল নম্বর"
required>

</div>

<div class="input-group">

<label>পাসওয়ার্ড</label>

<div style="display:flex;gap:10px;">

<input
type="password"
id="password"
placeholder="পাসওয়ার্ড"
style="flex:1;"
required>

<button
type="button"
id="togglePassword"
style="width:65px;border:none;border-radius:12px;background:#3D5AFE;color:#fff;font-size:20px;">

👁

</button>

</div>

</div>

<button class="btn" type="submit">

রেজিস্টার

</button>

</form>

<div class="link">

আগে থেকেই অ্যাকাউন্ট আছে?

<a href="signin.html">

সাইন ইন

</a>

</div>

</div>

</div>

<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/main.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("./sw.js")

.then(() => {

console.log("Service Worker Registered");

})

.catch((err) => {

console.log("Service Worker Error:", err);

});

});

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>চাঁদা যোগ করুন</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d6efd">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">

<div>

<h2>মাসিক চাঁদা</h2>

<p id="memberTitle">সদস্যের তথ্য</p>

</div>

<button class="back-btn" onclick="history.back()">

←

</button>

</header>

<div class="container">

<div class="card">

<div style="text-align:center;margin-bottom:25px;">

<img
id="memberPhoto"
src="images/default-user.png"
alt="Profile"
style="
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid #4F7CFF;
background:#eee;
">

<h2 id="memberName" style="margin-top:12px;"></h2>

<p id="memberHouse" style="color:#666;"></p>

<p id="memberPhone" style="color:#666;"></p>

</div>

<hr>

<br>

<label>মাস নির্বাচন</label>

<select id="month" class="input">

<option>জানুয়ারি</option>
<option>ফেব্রুয়ারি</option>
<option>মার্চ</option>
<option>এপ্রিল</option>
<option>মে</option>
<option>জুন</option>
<option>জুলাই</option>
<option>আগস্ট</option>
<option>সেপ্টেম্বর</option>
<option>অক্টোবর</option>
<option>নভেম্বর</option>
<option>ডিসেম্বর</option>

</select>

<br><br>

<label>বছর</label>

<input
type="number"
id="year"
class="input"
value="2026">

<br><br>

<label>জমার পরিমাণ (৳)</label>

<input
type="number"
id="amount"
class="input"
placeholder="যেমন 500">

<br><br>

<button
id="savePayment"
class="btn">

💰 চাঁদা সংরক্ষণ করুন

</button>

<br><br>

<h3>জমার ইতিহাস</h3>

<div id="paymentHistory">

<p style="text-align:center">

কোন হিসাব নেই

</p>

</div>

<br>

<div class="card">

<h3>মোট জমা</h3>

<h2 id="totalPaid">৳ 0</h2>

</div>

</div>

</div>

<script type="module" src="js/payment.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("./sw.js")

.then(() => {

console.log("Service Worker Registered");

})

.catch((err) => {

console.log("Service Worker Error:", err);

});

});

}

</script>

</body>

</html>

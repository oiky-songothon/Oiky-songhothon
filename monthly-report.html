<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>মাসিক রিপোর্ট</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d6efd">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">

<div>

<h2>📄 মাসিক রিপোর্ট</h2>

<p>ঐক্য সংগঠন</p>

</div>

<button
class="back-btn"
onclick="history.back()">

←

</button>

</header>

<div class="container">

<div class="card">

<h3>মাস নির্বাচন করুন</h3>

<select id="reportMonth" class="input">

<option>জানুয়ারি</option>
<option>ফেব্রুয়ারি</option>
<option>মার্চ</option>
<option>এপ্রিল</option>
<option>মে</option>
<option>জুন</option>
<option>জুলাই</option>
<option>আগস্ট</option>
<option>সেপ্টেম্বর</option>
<option>অক্টোবর</option>
<option>নভেম্বর</option>
<option>ডিসেম্বর</option>

</select>

<br><br>

<input
type="number"
id="reportYear"
class="input"
placeholder="বছর">

<br><br>

<button
id="loadReport"
class="btn">

📊 রিপোর্ট দেখুন

</button>

</div>

<div class="stats-grid">

<div class="stat-card">

<h2 id="reportMembers">0</h2>

<p>মোট সদস্য</p>

</div>

<div class="stat-card">

<h2 id="reportPaid">0</h2>

<p>চাঁদা দিয়েছে</p>

</div>

<div class="stat-card">

<h2 id="reportDue">0</h2>

<p>বকেয়া</p>

</div>

<div class="stat-card">

<h2 id="reportMoney">৳ 0</h2>

<p>মোট সংগ্রহ</p>

</div>

</div>

<div class="card">

<h3>চাঁদা প্রদানকারী সদস্য</h3>

<div id="paidList">

<p>কোন তথ্য নেই</p>

</div>

</div>

<div class="card">

<h3>বকেয়া সদস্য</h3>

<div id="dueList">

<p>কোন তথ্য নেই</p>

</div>

</div>

<div class="card">

<button
id="downloadMonthlyPdf"
class="btn">

📄 PDF Download

</button>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="js/monthly-report.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("./sw.js")

.then(() => {

console.log("Service Worker Registered");

})

.catch((err) => {

console.log("Service Worker Error:", err);

});

});

}

</script>

</body>

</html>
